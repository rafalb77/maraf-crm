worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Limit rozmiaru uploadu (DWG/PDF mogą być duże)
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream app {
        server app:3000;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Jeśli nie masz certyfikatu — usuń ten redirect i zostaw tylko location /
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # Certyfikaty SSL — umieść pliki w ./nginx/certs/
        # Do testów możesz użyć self-signed:
        #   openssl req -x509 -nodes -newkey rsa:2048 -keyout certs/key.pem -out certs/cert.pem -days 365
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Proxy do Next.js
        location / {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeout dla dużych plików i analizy AI
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Pliki statyczne Next.js — cache
        location /_next/static/ {
            proxy_pass http://app;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400, immutable";
        }

        # Przesłane rysunki — cache
        location /uploads/ {
            proxy_pass http://app;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}
